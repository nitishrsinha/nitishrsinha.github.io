name = "research-gate"
main = "worker.js"
compatibility_date = "2026-06-01"

# lets worker.js `import template from "./template.html"` as a string
[[rules]]
type = "Text"
globs = ["**/*.html"]
fallthrough = true

[vars]
ALLOWED_ORIGIN = "https://nitishrsinha.github.io"
GITHUB_REPO = "nitishrsinha/nitishrsinha.github.io"
GITHUB_BRANCH = "main"

# Create with:  wrangler kv namespace create RATE_LIMIT
# then paste the printed id below.
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "d609d0fe8a30401ea162ad07ab24d961"
